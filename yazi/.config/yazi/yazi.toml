# Yazi Configuration (Behavior)
# Reference: https://yazi-rs.github.io/docs/configuration/yazi

[manager]
ratio = [ 1, 4, 3 ]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = true
show_symlink = true


[preview]
tab_size = 4
max_width = 1000
max_height = 1000
cache_dir = ""
image_filter = "triangle"
image_quality = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
edit = [
	{ run = 'micro "$@"', block = true, desc = "Edit with micro" },
	{ run = 'code "$@"', desc = "Edit with VS Code" },
]
open = [
	{ run = 'xdg-open "$@"', desc = "Open with system" },
]
reveal = [
	{ run = 'explorer.exe "$(wslpath -w "$1")"', desc = "Reveal in Windows Explorer" },
]

[open]
rules = [
	{ name = "*/", use = [ "edit", "open", "reveal" ] },
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	{ mime = "image/*", use = [ "open", "reveal" ] },
	{ mime = "video/*", use = [ "open", "reveal" ] },
	{ mime = "audio/*", use = [ "open", "reveal" ] },
	{ mime = "application/pdf", use = [ "open", "reveal" ] },
	{ mime = "application/json", use = [ "edit", "reveal" ] },
]

[input]
# Search with zoxide integration
cd_title  = "Jump to:"
cd_origin = "top-center"
cd_offset = [ 0, 2, 50, 3 ]
